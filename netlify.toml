# netlify.toml
[build]
command = "npm install"
# Vite genera la carpeta 'dist', no 'build'

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*" # Vite pone los archivos en assets
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
